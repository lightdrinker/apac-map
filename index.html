<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>APAC 국가 지도</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#04080f">
<meta name="description" content="APAC 33개국 인터랙티브 지도 — 권역별 탐색과 한국 기준 실시간 시차">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APAC Map">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #04080f;
    --bg-2: #0a1424;
    --ocean: #060f1e;
    --land-dim: #11203a;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-faint: #1e3a5f;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding-bottom: env(safe-area-inset-bottom);
  }

  #header { text-align: center; padding: 20px 16px 0; }
  .subtitle { font-size: 10px; letter-spacing: 5px; color: #3b82f6; margin-bottom: 6px; }
  h1 {
    font-size: clamp(22px, 5vw, 36px); font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(90deg, #60a5fa, #34d399, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 200% auto; animation: shine 6s linear infinite;
  }
  @keyframes shine { to { background-position: 200% center; } }
  .meta { color: var(--text-faint); font-size: 12px; margin-top: 4px; font-weight: 500; }

  #filters {
    display: flex; gap: 7px; padding: 16px 16px 10px;
    overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  #filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 7px 14px; border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.10);
    background: transparent; color: var(--text-dim);
    font-size: 12px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; font-family: inherit; line-height: 1.2;
    display: flex; align-items: center; gap: 4px;
  }
  .chip .en { font-size: 9px; opacity: 0.6; font-weight: 400; }
  .chip.active { font-weight: 700; }

  #map-wrap { position: relative; background: var(--ocean); margin: 0; }
  #map-svg { display: block; width: 100%; touch-action: none; }
  .country { cursor: default; transition: opacity 0.25s, fill 0.18s; }
  .country.clickable { cursor: pointer; }
  .country.dimmed { opacity: 0.18; }
  .label {
    pointer-events: none; font-weight: 700; fill: rgba(255,255,255,0.85);
    text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
  }
  .label-en { font-weight: 500; fill: rgba(255,255,255,0.55); }

  #zoom-region-btn {
    position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%) translateY(20px);
    padding: 10px 18px; border-radius: 22px; border: none;
    color: white; font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(.34,1.4,.64,1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: inline-flex; align-items: center; gap: 6px;
  }
  #zoom-region-btn.show {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  #zoom-region-btn:active { transform: translateX(-50%) scale(0.96); }

  #home-btn {
    position: absolute; top: 12px; left: 12px;
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(6,15,30,0.88); color: #60a5fa;
    font-size: 18px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(10px); font-family: inherit;
  }
  #home-btn.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #zoom-btns {
    position: absolute; bottom: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .zbtn {
    width: 36px; height: 36px; border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(6,15,30,0.85); color: #60a5fa;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); font-family: inherit;
  }

  #legend { padding: 14px 16px 24px; }
  .leg-title { font-size: 10px; letter-spacing: 3px; color: var(--text-faint); margin-bottom: 12px; }
  .leg-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 600px) { .leg-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { .leg-grid { grid-template-columns: repeat(3, 1fr); } }
  .leg-card {
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.2s;
  }
  .leg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-region { display: flex; flex-direction: column; gap: 1px; }
  .leg-region .ko { font-size: 13px; font-weight: 700; color: var(--text); }
  .leg-region .en { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
  .leg-count {
    margin-left: auto; font-size: 11px; color: var(--text-dim);
    background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px;
  }
  .leg-countries { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 4px; }
  .leg-country {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-radius: 8px;
    background: rgba(255,255,255,0.02);
    cursor: pointer; transition: background 0.15s;
    font-size: 12px;
  }
  .leg-country:active { background: rgba(255,255,255,0.08); }
  .leg-country .flag { font-size: 15px; line-height: 1; flex-shrink: 0; }
  .leg-country .nm { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
  }
  #backdrop.show { opacity: 1; pointer-events: auto; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, #0d1828, #04080f);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 12px 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(.34,1.2,.64,1);
    z-index: 101; max-height: 80vh; overflow-y: auto;
  }
  #sheet.show { transform: translateY(0); }
  .grabber { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 14px; }
  .sheet-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
  .sheet-flag { font-size: 52px; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
  .sheet-names { flex: 1; }
  .sheet-name-ko { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .sheet-name-en { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .sheet-region-tag {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 8px;
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .sheet-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: none;
    color: var(--text-dim); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; flex-shrink: 0;
  }

  .sec-label { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 10px; }
  .time-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 18px;
  }
  .time-card {
    padding: 12px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .time-card .loc { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .time-card .clock {
    font-size: 28px; font-weight: 700; letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
  }
  .time-card .date { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .time-diff {
    text-align: center; font-size: 12px; color: var(--text-dim);
    margin-bottom: 18px;
    padding: 8px; background: rgba(255,255,255,0.02);
    border-radius: 10px;
  }
  .time-diff .val { font-weight: 700; color: var(--text); }

  .city-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .city-chip {
    padding: 6px 12px; border-radius: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
    font-size: 12px; color: var(--text); font-weight: 500;
  }
  .city-chip.cap {
    background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.3);
    color: #93c5fd;
  }
  .city-chip.cap::before { content: '★ '; font-size: 10px; }

  #disclaimer { text-align: center; padding: 0 0 24px; font-size: 10px; color: var(--text-faint); }

  #loading {
    padding: 40px 16px; text-align: center; color: var(--text-dim); font-size: 13px;
  }

  /* ── Fixed App Footer ── */
  body { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
  .app-footer {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    background: rgba(6,15,30,0.92);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: var(--text-dim);
    z-index: 99;
  }
  .footer-name { color: #2563eb; font-weight: 700; }
  .footer-sep { color: rgba(255,255,255,0.18); }
  .footer-email {
    color: var(--text-dim); text-decoration: none;
    display: inline-flex; align-items: center; gap: 3px;
    transition: color 0.15s;
  }
  .footer-email:hover { color: #60a5fa; }
  .footer-bug-btn {
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .footer-bug-btn:hover {
    border-color: rgba(248,113,113,0.45);
    color: #f87171;
    background: rgba(248,113,113,0.08);
  }

  /* ── Bug Report Modal ── */
  #bug-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  #bug-backdrop.show { opacity: 1; pointer-events: auto; }
  #bug-modal {
    width: 100%; max-width: 440px;
    background: linear-gradient(180deg, #0d1828, #04080f);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
    transform: scale(0.95);
    transition: transform 0.25s cubic-bezier(.34,1.2,.64,1);
    max-height: 90vh; overflow-y: auto;
  }
  #bug-backdrop.show #bug-modal { transform: scale(1); }
  .bug-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .bug-modal-title { font-size: 16px; font-weight: 800; color: var(--text); }
  .bug-modal-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: none;
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .bug-field { margin-bottom: 12px; }
  .bug-label {
    display: block; font-size: 10px; letter-spacing: 1.5px;
    color: var(--text-dim); margin-bottom: 6px;
    text-transform: uppercase;
  }
  .bug-req { color: #f87171; }
  .bug-input, .bug-textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit; font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
  }
  .bug-textarea { resize: vertical; min-height: 110px; }
  .bug-input:focus, .bug-textarea:focus {
    outline: none;
    border-color: #60a5fa;
    background: rgba(96,165,250,0.06);
  }
  .bug-actions { display: flex; gap: 8px; margin-top: 16px; }
  .bug-btn {
    flex: 1; padding: 10px 14px;
    border-radius: 10px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .bug-btn-primary {
    background: linear-gradient(135deg, #60a5fa, #34d399);
    color: #04080f;
  }
  .bug-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .bug-btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .bug-btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .bug-error {
    margin-top: 10px; padding: 8px 10px; border-radius: 8px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    color: #f87171; font-size: 12px;
  }
  .bug-success { text-align: center; padding: 24px 6px 10px; }
  .bug-success-icon {
    width: 60px; height: 60px; margin: 0 auto 14px;
    border-radius: 50%;
    background: rgba(52,211,153,0.15);
    border: 2px solid rgba(52,211,153,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #34d399;
  }
  .bug-success-text { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .bug-success-sub { font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

<div id="header">
  <div class="subtitle">ASIA PACIFIC REGION</div>
  <h1>APAC 국가 지도</h1>
  <p class="meta">33개국 · 5개 권역 · 권역 선택 → 확대해서 자세히 보기</p>
</div>

<div id="filters">
  <button class="chip active" data-region="" style="border-color:#fff;color:#fff;background:rgba(255,255,255,0.1)">
    🌏 전체 <span class="en">ALL</span>
  </button>
</div>

<div id="map-wrap">
  <svg id="map-svg"></svg>
  <div id="loading">지도 데이터 로딩 중…</div>
  <button id="home-btn" title="홈으로">⌂</button>
  <button id="zoom-region-btn">🔍 확대해서 보기</button>
  <div id="zoom-btns">
    <button class="zbtn" id="zin">+</button>
    <button class="zbtn" id="zout">−</button>
  </div>
</div>

<div id="legend">
  <div class="leg-title">REGION LEGEND</div>
  <div class="leg-grid" id="leg-grid"></div>
</div>

<div id="disclaimer">* 기관 기준에 따라 포함 국가는 다를 수 있음</div>

<footer class="app-footer">
  <span class="footer-copy">© 2026 <strong class="footer-name">Jun</strong></span>
  <span class="footer-sep">·</span>
  <a class="footer-email" href="mailto:lightdrinker@naver.com">
    <span class="footer-email-icon">✉</span>
    lightdrinker@naver.com
  </a>
  <span class="footer-sep">·</span>
  <button class="footer-bug-btn" id="bug-open-btn" type="button">버그 리포트</button>
</footer>

<!-- Bug Report Modal -->
<div id="bug-backdrop">
  <div id="bug-modal" role="dialog" aria-labelledby="bug-modal-title">
    <div id="bug-form-view">
      <div class="bug-modal-head">
        <div class="bug-modal-title" id="bug-modal-title">버그 리포트</div>
        <button class="bug-modal-close" id="bug-close-btn" type="button" aria-label="닫기">✕</button>
      </div>
      <form id="bug-form" novalidate>
        <div class="bug-field">
          <label class="bug-label" for="bug-title-input">제목 <span class="bug-req">*</span></label>
          <input class="bug-input" type="text" id="bug-title-input" name="bug_title" maxlength="100" required placeholder="간단한 한 줄 요약">
        </div>
        <div class="bug-field">
          <label class="bug-label" for="bug-body-input">내용 <span class="bug-req">*</span></label>
          <textarea class="bug-textarea" id="bug-body-input" name="bug_body" rows="6" required placeholder="언제 / 어떤 화면 / 무엇이 잘못되었는지"></textarea>
        </div>
        <div class="bug-field">
          <label class="bug-label" for="bug-contact-input">연락처 (선택)</label>
          <input class="bug-input" type="text" id="bug-contact-input" name="reporter_contact" placeholder="이메일 또는 카톡 ID — 답신 받을 곳">
        </div>
        <div id="bug-error" class="bug-error" style="display:none"></div>
        <div class="bug-actions">
          <button type="button" class="bug-btn bug-btn-secondary" id="bug-cancel-btn">취소</button>
          <button type="submit" class="bug-btn bug-btn-primary" id="bug-submit-btn">전송</button>
        </div>
      </form>
    </div>
    <div id="bug-success-view" style="display:none">
      <div class="bug-success">
        <div class="bug-success-icon">✓</div>
        <div class="bug-success-text">전송 완료</div>
        <div class="bug-success-sub">리포트 감사합니다. 빠른 시일 내 확인할게요.</div>
        <button type="button" class="bug-btn bug-btn-secondary" style="margin-top:18px;width:100%" id="bug-done-btn">닫기</button>
      </div>
    </div>
  </div>
</div>

<div id="backdrop"></div>
<div id="sheet">
  <div class="grabber"></div>
  <div class="sheet-head">
    <div class="sheet-flag" id="s-flag">🌍</div>
    <div class="sheet-names">
      <div class="sheet-name-ko" id="s-ko">—</div>
      <div class="sheet-name-en" id="s-en">—</div>
      <div class="sheet-region-tag" id="s-region">—</div>
    </div>
    <button class="sheet-close" id="s-close">✕</button>
  </div>

  <div class="sec-label">CURRENT TIME</div>
  <div class="time-row">
    <div class="time-card">
      <div class="loc">🇰🇷 한국 (Seoul)</div>
      <div class="clock" id="s-time-kr">--:--:--</div>
      <div class="date" id="s-date-kr">—</div>
    </div>
    <div class="time-card">
      <div class="loc"><span id="s-time-flag">🌍</span> <span id="s-time-city">—</span></div>
      <div class="clock" id="s-time-local">--:--:--</div>
      <div class="date" id="s-date-local">—</div>
    </div>
  </div>
  <div class="time-diff" id="s-diff">시차 계산 중…</div>

  <div class="sec-label">MAJOR CITIES</div>
  <div class="city-list" id="s-cities"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="app.js"></script>
</body>
</html>
