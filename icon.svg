<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#11203a"/>
      <stop offset="60%" stop-color="#0a1424"/>
      <stop offset="100%" stop-color="#04080f"/>
    </radialGradient>
    <linearGradient id="globe" x1="20%" y1="15%" x2="80%" y2="85%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="hl" cx="32%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="65%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- 배경 (전체 사각형, iOS/Android 마스킹용) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 글로브 베이스 -->
  <circle cx="256" cy="256" r="180" fill="url(#globe)"/>

  <!-- 위도/경도 그리드 -->
  <g stroke="#ffffff" stroke-opacity="0.32" stroke-width="2.5" fill="none">
    <!-- 적도 -->
    <line x1="76" y1="256" x2="436" y2="256"/>
    <!-- 위도선 (적도와 평행) -->
    <ellipse cx="256" cy="256" rx="180" ry="85"/>
    <!-- 자오선 -->
    <line x1="256" y1="76" x2="256" y2="436"/>
    <!-- 경도선 -->
    <ellipse cx="256" cy="256" rx="85" ry="180"/>
    <ellipse cx="256" cy="256" rx="145" ry="180"/>
  </g>

  <!-- 한국 위치 마커 (북동쪽) -->
  <g>
    <circle cx="318" cy="198" r="16" fill="#ffffff" fill-opacity="0.95"/>
    <circle cx="318" cy="198" r="7" fill="#fbbf24"/>
  </g>

  <!-- 글로브 하이라이트 (좌상단 광택) -->
  <circle cx="256" cy="256" r="180" fill="url(#hl)"/>

  <!-- 글로브 우하단 그림자 -->
  <circle cx="256" cy="256" r="180" fill="url(#shadow)"/>

  <!-- 글로브 테두리 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
</svg>
